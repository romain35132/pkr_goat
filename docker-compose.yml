version: '3.8'

services:
  app:
    build: .
    container_name: pkr_goat_app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://pkr_user:pkr_password@db:5432/pkr_goat
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: pkr_goat_db
    environment:
      POSTGRES_USER: pkr_user
      POSTGRES_PASSWORD: pkr_password
      POSTGRES_DB: pkr_goat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: pkr_goat_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
